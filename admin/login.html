<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>后台管理 · 登录</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy-900:#0a1628;--navy-800:#0d1f3c;--navy-600:#153060;
      --accent:#2563eb;--accent-light:#3b82f6;--accent-glow:rgba(37,99,235,.35);
      --text-primary:#e8edf7;--text-secondary:#9aaec8;--text-muted:#5a7199;
      --border:rgba(255,255,255,.08);--font:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
    }
    body{font-family:var(--font);background:var(--navy-900);color:var(--text-primary);
      min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;
      background-image:linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);
      background-size:60px 60px;pointer-events:none;}
    .glow{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      width:600px;height:600px;
      background:radial-gradient(circle,rgba(37,99,235,.1) 0%,transparent 70%);
      pointer-events:none;}
    .card{position:relative;z-index:1;background:rgba(13,31,60,.85);
      border:1px solid var(--border);border-radius:16px;padding:48px 40px;
      width:100%;max-width:400px;backdrop-filter:blur(16px);
      box-shadow:0 24px 64px rgba(0,0,0,.4);}
    .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center;}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent-light));
      border-radius:10px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 20px var(--accent-glow);}
    .logo-icon svg{width:22px;height:22px;fill:#fff;}
    .logo-text{font-size:18px;font-weight:700;}
    .subtitle{text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:36px;}
    .form-group{margin-bottom:20px;}
    label{display:block;font-size:13px;color:var(--text-secondary);margin-bottom:8px;font-weight:500;}
    input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);
      border-radius:8px;padding:12px 14px;color:var(--text-primary);font-size:14px;
      font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;}
    input:focus{border-color:rgba(37,99,235,.6);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
    input::placeholder{color:var(--text-muted);}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),#1d4ed8);
      color:#fff;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer;
      font-family:var(--font);transition:all .2s;box-shadow:0 4px 16px rgba(37,99,235,.4);
      margin-top:8px;}
    .btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(37,99,235,.55);}
    .btn:active{transform:translateY(0);}
    .hint{text-align:center;font-size:12px;color:var(--text-muted);margin-top:20px;}
    .hint strong{color:var(--accent-light);}
    .error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
      border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;
      margin-bottom:16px;display:none;}
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23" stroke="#fff" stroke-width="2"/><line x1="8" y1="23" x2="16" y2="23" stroke="#fff" stroke-width="2"/></svg>
      </div>
      <span class="logo-text">VoiceSDK 后台管理</span>
    </div>
    <p class="subtitle">请登录后继续操作</p>
    <div class="error" id="errMsg">用户名或密码错误，请重试</div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username"/>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn">登 录</button>
    </form>
    <p class="hint">默认账号 <strong>admin</strong> / 密码 <strong>admin123</strong></p>
  </div>
  <script>
    // 已登录直接跳转
    if(sessionStorage.getItem('admin_logged')==='1') location.href='index.html';

    function doLogin(e){
      e.preventDefault();
      const u=document.getElementById('username').value.trim();
      const p=document.getElementById('password').value;
      // 从配置读取账号密码，默认 admin/admin123
      const cfg=JSON.parse(localStorage.getItem('sdk_admin_cfg')||'{}');
      const user=cfg.adminUser||'admin';
      const pass=cfg.adminPass||'admin123';
      if(u===user&&p===pass){
        sessionStorage.setItem('admin_logged','1');
        location.href='index.html';
      } else {
        document.getElementById('errMsg').style.display='block';
      }
    }
  </script>
</body>
</html>
